<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>消消乐</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: linear-gradient(135deg,#1a0533 0%,#2d0a5e 50%,#1a0533 100%);
  min-height:100vh; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  font-family:'Arial Rounded MT Bold',Arial,sans-serif; overflow:hidden;
}
.stars { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
.star { position:absolute; background:white; border-radius:50%; animation:twinkle 2s infinite alternate; }
@keyframes twinkle { from{opacity:.2;transform:scale(1)} to{opacity:1;transform:scale(1.4)} }

.hud { position:relative; z-index:10; display:flex; align-items:center; gap:16px; margin-bottom:10px; }
.level-badge {
  background:linear-gradient(180deg,#ffd700,#ff8c00);
  border:3px solid #fff; border-radius:50%; width:58px; height:58px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  box-shadow:0 0 15px #ffd700aa; color:#fff; font-weight:bold;
}
.level-badge .lnum { font-size:22px; line-height:1; }
.level-badge .ltxt { font-size:9px; }
.score-box {
  background:rgba(255,255,255,.1); border:2px solid rgba(255,255,255,.3);
  border-radius:18px; padding:6px 18px; color:white; text-align:center;
  backdrop-filter:blur(5px);
}
.score-box .slabel { font-size:11px; opacity:.8; }
.score-box .sval { font-size:26px; font-weight:bold; color:#ffd700; }

.goals-panel {
  position:relative; z-index:10;
  background:rgba(255,255,255,.08); border:2px solid rgba(255,255,255,.2);
  border-radius:14px; padding:8px 18px; display:flex; gap:18px; margin-bottom:8px;
  backdrop-filter:blur(5px);
}
.goal-item { display:flex; flex-direction:column; align-items:center; gap:3px; }
.goal-emoji { font-size:26px; }
.goal-count { font-size:13px; font-weight:bold; color:white; background:rgba(0,0,0,.4); border-radius:8px; padding:1px 7px; }
.goal-count.done { color:#4cff4c; }

.moves-bar { position:relative; z-index:10; display:flex; align-items:center; gap:8px; margin-bottom:8px; color:white; }
.moves-label { font-size:13px; opacity:.8; }
.moves-count { font-size:30px; font-weight:bold; color:#ff6b6b; text-shadow:0 0 10px #ff6b6b88; }

.board-wrapper {
  position:relative; z-index:10;
  background:linear-gradient(180deg,#3d1278,#5a1fa0);
  border:4px solid rgba(255,255,255,.3); border-radius:20px; padding:10px;
  box-shadow:0 0 40px rgba(150,50,255,.5),inset 0 0 20px rgba(0,0,0,.3);
}
.board { display:grid; grid-template-columns:repeat(8,52px); grid-template-rows:repeat(8,52px); gap:3px; }

.cell {
  width:52px; height:52px; border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  font-size:28px; cursor:pointer;
  transition:transform .1s,filter .1s;
  position:relative; user-select:none;
  background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1);
}
.cell:hover:not(.obstacle) { transform:scale(1.1); filter:brightness(1.2); }
.cell.selected { transform:scale(1.15); filter:brightness(1.3); box-shadow:0 0 12px 4px rgba(255,255,100,.8); border-color:#ffd700; z-index:2; }
.cell.matched { animation:pop .3s ease-out forwards; }
.cell.hint { animation:hint-pulse .6s ease-in-out infinite alternate; }
.cell.hint-swap { animation:hint-swap-pulse .5s ease-in-out infinite alternate; border:2px solid #ffd700; }
.cell.hint-match { animation:hint-match-pulse .6s ease-in-out infinite alternate; }
.cell.falling { animation:fall .3s ease-out; }
.cell.obstacle { background:linear-gradient(135deg,#555,#333); border:2px solid #888; cursor:not-allowed; font-size:20px; }
.cell.obstacle:hover { transform:none; filter:none; }
.cell.frozen::after { content:'🧊'; position:absolute; font-size:34px; opacity:.65; pointer-events:none; }

@keyframes pop { 0%{transform:scale(1.2);opacity:1} 100%{transform:scale(0);opacity:0} }
@keyframes hint-pulse { from{box-shadow:0 0 0 0 rgba(255,255,100,.6)} to{box-shadow:0 0 0 10px rgba(255,255,100,0)} }
@keyframes hint-swap-pulse { from{box-shadow:0 0 4px 2px rgba(255,215,0,.8);transform:scale(1)} to{box-shadow:0 0 12px 6px rgba(255,215,0,0);transform:scale(1.12)} }
@keyframes hint-match-pulse { from{box-shadow:0 0 0 0 rgba(100,255,100,.7);background:rgba(100,255,100,.15)} to{box-shadow:0 0 0 8px rgba(100,255,100,0);background:rgba(100,255,100,.05)} }
@keyframes fall { from{transform:translateY(-60px);opacity:0} to{transform:translateY(0);opacity:1} }

.bottom-bar { position:relative; z-index:10; display:flex; gap:10px; margin-top:10px; }
.btn { padding:9px 20px; border:none; border-radius:22px; font-size:13px; font-weight:bold; cursor:pointer; transition:transform .1s,box-shadow .1s; }
.btn:hover { transform:scale(1.05); }
.btn:active { transform:scale(.97); }
.btn-hint { background:linear-gradient(180deg,#ffd700,#ff8c00); color:white; box-shadow:0 4px 15px rgba(255,140,0,.5); }
.btn-shuffle { background:linear-gradient(180deg,#00c6ff,#0072ff); color:white; box-shadow:0 4px 15px rgba(0,114,255,.5); }
.btn-restart { background:linear-gradient(180deg,#ff6b6b,#ee0979); color:white; box-shadow:0 4px 15px rgba(238,9,121,.5); }

.toast {
  position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:rgba(0,0,0,.85); color:white;
  padding:14px 30px; border-radius:18px; font-size:20px; font-weight:bold;
  z-index:100; transition:transform .2s; text-align:center;
  border:2px solid rgba(255,255,255,.3);
}
.toast.show { transform:translate(-50%,-50%) scale(1); }

.overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.7); z-index:50;
  align-items:center; justify-content:center; flex-direction:column; gap:20px;
}
.overlay.show { display:flex; }
.overlay-card {
  background:linear-gradient(135deg,#2d0a5e,#5a1fa0);
  border:3px solid rgba(255,255,255,.4); border-radius:24px;
  padding:36px 56px; text-align:center; color:white;
  box-shadow:0 0 60px rgba(150,50,255,.6);
}
.overlay-title { font-size:52px; margin-bottom:8px; }
.overlay-sub { font-size:17px; opacity:.8; margin-bottom:16px; }
.overlay-score { font-size:34px; font-weight:bold; color:#ffd700; margin-bottom:20px; }
.overlay-btn {
  padding:12px 36px; border:none; border-radius:25px;
  font-size:16px; font-weight:bold; cursor:pointer;
  background:linear-gradient(180deg,#ffd700,#ff8c00); color:white;
  box-shadow:0 4px 20px rgba(255,140,0,.6); transition:transform .1s;
}
.overlay-btn:hover { transform:scale(1.05); }

.combo-text {
  position:fixed; top:40%; left:50%;
  transform:translate(-50%,-50%);
  font-size:36px; font-weight:bold; color:#ffd700;
  text-shadow:0 0 20px #ffd700; pointer-events:none;
  animation:combo-anim .8s ease-out forwards; z-index:200;
}
@keyframes combo-anim {
  0%{opacity:1;transform:translate(-50%,-50%) scale(.5)}
  50%{opacity:1;transform:translate(-50%,-80%) scale(1.3)}
  100%{opacity:0;transform:translate(-50%,-120%) scale(1)}
}

.progress-bar-wrap {
  position:relative; z-index:10;
  width:440px; height:14px;
  background:rgba(255,255,255,.15); border-radius:7px;
  margin-bottom:8px; overflow:hidden;
  border:1px solid rgba(255,255,255,.2);
}
.progress-bar {
  height:100%; border-radius:7px;
  background:linear-gradient(90deg,#ffd700,#ff8c00);
  transition:width .4s ease;
  box-shadow:0 0 8px #ffd700aa;
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="hud">
  <div class="level-badge"><span class="lnum">1</span><span class="ltxt">关卡</span></div>
  <div class="score-box"><div class="slabel">得分</div><div class="sval" id="scoreVal">0</div></div>
  <div class="moves-bar">
    <span class="moves-icon">👣</span>
    <span class="moves-label">剩余步数</span>
    <span class="moves-count" id="movesVal">30</span>
  </div>
</div>

<div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>

<div class="goals-panel" id="goalsPanel"></div>

<div class="board-wrapper">
  <div class="board" id="board"></div>
</div>

<div class="bottom-bar">
  <button class="btn btn-hint" onclick="showHint()">💡 提示</button>
  <button class="btn btn-shuffle" onclick="shuffleBoard()">🔀 重排</button>
  <button class="btn btn-restart" onclick="restartGame()">🔄 重来</button>
</div>

<div class="toast" id="toast"></div>

<div class="overlay" id="overlay">
  <div class="overlay-card">
    <div class="overlay-title" id="overlayTitle"></div>
    <div class="overlay-sub" id="overlaySub"></div>
    <div class="overlay-score" id="overlayScore"></div>
    <button class="overlay-btn" onclick="restartGame()">再玩一次</button>
  </div>
</div>

<script>
// ── 配置 ──────────────────────────────────────────────
const GEMS = ['🍭','🍬','🍫','🍩','🎂','🍰','🧁'];
const COLS = 8, ROWS = 8;

// 关卡配置（前3关手工设计，之后动态生成）
const LEVEL_CONFIGS = [
  {
    targetScore: 3000, moves: 30,
    goals: [{emoji:'🍭',target:20},{emoji:'🍫',target:15},{emoji:'🍩',target:10}],
    obstacles: [[3,0],[3,7],[4,0],[4,7]],
    frozen: [[1,2],[1,5],[6,2],[6,5]],
  },
  {
    targetScore: 5000, moves: 25,
    goals: [{emoji:'🍬',target:25},{emoji:'🎂',target:20},{emoji:'🍭',target:15}],
    obstacles: [[0,3],[0,4],[7,3],[7,4],[3,0],[4,0],[3,7],[4,7]],
    frozen: [[2,1],[2,6],[5,1],[5,6],[3,3],[3,4]],
  },
  {
    targetScore: 8000, moves: 22,
    goals: [{emoji:'🍰',target:30},{emoji:'🧁',target:25},{emoji:'🍫',target:20}],
    obstacles: [[0,0],[0,7],[7,0],[7,7],[3,3],[3,4],[4,3],[4,4]],
    frozen: [[1,1],[1,6],[6,1],[6,6],[2,3],[2,4],[5,3],[5,4]],
  },
];

// 动态生成第N关配置（N从1开始）
function genLevelConfig(n) {
  if (n <= LEVEL_CONFIGS.length) return LEVEL_CONFIGS[n-1];
  const diff = n - LEVEL_CONFIGS.length;
  const obstacleCount = Math.min(4 + diff * 2, 12);
  const frozenCount = Math.min(4 + diff * 2, 14);
  const obs = [], frz = [], used = new Set();
  const rnd = (max) => Math.floor(Math.random() * max);
  while (obs.length < obstacleCount) {
    const r = rnd(ROWS), c = rnd(COLS), k = `${r},${c}`;
    if (!used.has(k)) { obs.push([r,c]); used.add(k); }
  }
  while (frz.length < frozenCount) {
    const r = rnd(ROWS), c = rnd(COLS), k = `${r},${c}`;
    if (!used.has(k)) { frz.push([r,c]); used.add(k); }
  }
  return {
    targetScore: 3000 + diff * 3000,
    moves: Math.max(15, 30 - diff * 2),
    goals: [
      {emoji: GEMS[diff % GEMS.length], target: 20 + diff * 5},
      {emoji: GEMS[(diff+2) % GEMS.length], target: 15 + diff * 4},
      {emoji: GEMS[(diff+4) % GEMS.length], target: 10 + diff * 3},
    ],
    obstacles: obs,
    frozen: frz,
  };
}

// ── 状态 ──────────────────────────────────────────────
let board = [];
let selected = null;
let score = 0;
let currentLevel = 1;
let levelConfig = genLevelConfig(1);
let moves = levelConfig.moves;
let goals = levelConfig.goals.map(g => ({...g, current:0}));
let animating = false;
let hintCells = [];
let hintTimer = null;

// ── 初始化星星背景 ─────────────────────────────────────
function initStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 3 + 1;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%;
      left:${Math.random()*100}%;
      animation-delay:${Math.random()*3}s;
      animation-duration:${1.5+Math.random()*2}s;
    `;
    container.appendChild(s);
  }
}

// ── 棋盘初始化 ─────────────────────────────────────────
function isObstacle(r, c) {
  return levelConfig.obstacles.some(([or,oc]) => or===r && oc===c);
}
function isFrozen(r, c) {
  return levelConfig.frozen.some(([fr,fc]) => fr===r && fc===c);
}

function randomGem() {
  return GEMS[Math.floor(Math.random() * GEMS.length)];
}

function initBoard() {
  board = [];
  for (let r = 0; r < ROWS; r++) {
    board[r] = [];
    for (let c = 0; c < COLS; c++) {
      if (isObstacle(r, c)) {
        board[r][c] = { type:'obstacle', gem:null };
      } else {
        let gem;
        do {
          gem = randomGem();
        } while (
          (c >= 2 && board[r][c-1].gem === gem && board[r][c-2].gem === gem) ||
          (r >= 2 && board[r-1][c].gem === gem && board[r-2][c].gem === gem)
        );
        board[r][c] = { type:'gem', gem, frozen: isFrozen(r,c) };
      }
    }
  }
}

// ── 渲染 ──────────────────────────────────────────────
function renderBoard() {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.r = r;
      cell.dataset.c = c;
      const data = board[r][c];
      if (data.type === 'obstacle') {
        cell.classList.add('obstacle');
        cell.textContent = '🪨';
      } else {
        cell.textContent = data.gem || '';
        if (data.frozen) cell.classList.add('frozen');
      }
      cell.addEventListener('click', () => onCellClick(r, c));
      boardEl.appendChild(cell);
    }
  }
}

function getCellEl(r, c) {
  return document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
}

function renderGoals() {
  const panel = document.getElementById('goalsPanel');
  panel.innerHTML = '';
  goals.forEach(g => {
    const item = document.createElement('div');
    item.className = 'goal-item';
    const remaining = Math.max(0, g.target - g.current);
    item.innerHTML = `
      <div class="goal-emoji">${g.emoji}</div>
      <div class="goal-count ${remaining===0?'done':''}">${remaining===0?'✓':remaining}</div>
    `;
    panel.appendChild(item);
  });
}

function renderHUD() {
  document.getElementById('scoreVal').textContent = score.toLocaleString();
  document.getElementById('movesVal').textContent = moves;
  document.querySelector('.level-badge .lnum').textContent = currentLevel;
  const pct = Math.min(100, Math.round(score / levelConfig.targetScore * 100));
  document.getElementById('progressBar').style.width = pct + '%';
  renderGoals();
}

// ── 点击逻辑 ──────────────────────────────────────────
function onCellClick(r, c) {
  if (animating) return;
  clearHint();
  const data = board[r][c];
  if (data.type === 'obstacle') return;
  if (data.frozen) { showToast('❄️ 冰冻中，无法移动！'); return; }

  if (selected === null) {
    selected = {r, c};
    getCellEl(r, c).classList.add('selected');
  } else {
    const {r:sr, c:sc} = selected;
    getCellEl(sr, sc).classList.remove('selected');
    if (sr === r && sc === c) { selected = null; return; }
    if (isAdjacent(sr, sc, r, c)) {
      trySwap(sr, sc, r, c);
    } else {
      selected = {r, c};
      getCellEl(r, c).classList.add('selected');
    }
  }
}

function isAdjacent(r1,c1,r2,c2) {
  return (Math.abs(r1-r2) + Math.abs(c1-c2)) === 1;
}

function trySwap(r1,c1,r2,c2) {
  selected = null;
  swapGems(r1,c1,r2,c2);
  const matches = findMatches();
  if (matches.length === 0) {
    swapGems(r1,c1,r2,c2);
    showToast('❌ 无法消除');
    renderBoard();
    return;
  }
  moves--;
  animating = true;
  renderBoard();
  processMatches(matches, 1);
}

function swapGems(r1,c1,r2,c2) {
  const tmp = board[r1][c1].gem;
  board[r1][c1].gem = board[r2][c2].gem;
  board[r2][c2].gem = tmp;
  // swap frozen state too
  const tf = board[r1][c1].frozen;
  board[r1][c1].frozen = board[r2][c2].frozen;
  board[r2][c2].frozen = tf;
}

// ── 匹配检测 ──────────────────────────────────────────
function findMatches() {
  const matched = new Set();
  // 横向
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS-2; c++) {
      const g = board[r][c].gem;
      if (!g || board[r][c].type==='obstacle') continue;
      if (board[r][c+1].gem===g && board[r][c+2].gem===g) {
        let len = 3;
        while (c+len < COLS && board[r][c+len].gem===g) len++;
        for (let i=0;i<len;i++) matched.add(`${r},${c+i}`);
      }
    }
  }
  // 纵向
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r < ROWS-2; r++) {
      const g = board[r][c].gem;
      if (!g || board[r][c].type==='obstacle') continue;
      if (board[r+1][c].gem===g && board[r+2][c].gem===g) {
        let len = 3;
        while (r+len < ROWS && board[r+len][c].gem===g) len++;
        for (let i=0;i<len;i++) matched.add(`${r+i},${c}`);
      }
    }
  }
  return [...matched].map(k => { const [r,c]=k.split(','); return {r:+r,c:+c}; });
}

// ── 消除流程 ──────────────────────────────────────────
function processMatches(matches, combo) {
  if (matches.length === 0) { animating = false; checkGameEnd(); return; }

  // 播放消除动画
  matches.forEach(({r,c}) => {
    const el = getCellEl(r,c);
    if (el) el.classList.add('matched');
  });

  if (combo > 1) showCombo(combo);

  setTimeout(() => {
    // 计分 & 目标 & 解冻相邻冰冻格
    const toUnfreeze = new Set();
    matches.forEach(({r,c}) => {
      const gem = board[r][c].gem;
      score += 50 * combo;
      goals.forEach(g => { if (g.emoji===gem) g.current++; });
      board[r][c].gem = null;
      board[r][c].frozen = false;
      // 检查四周是否有冰冻格，消除相邻触发解冻
      [[r-1,c],[r+1,c],[r,c-1],[r,c+1]].forEach(([nr,nc]) => {
        if (nr>=0&&nr<ROWS&&nc>=0&&nc<COLS && board[nr][nc].frozen) {
          toUnfreeze.add(`${nr},${nc}`);
        }
      });
    });
    toUnfreeze.forEach(k => {
      const [nr,nc] = k.split(',').map(Number);
      board[nr][nc].frozen = false;
    });
    if (toUnfreeze.size > 0) showToast(`❄️ 解冻了 ${toUnfreeze.size} 个冰格！`);
    renderHUD();
    dropGems();
    setTimeout(() => {
      fillBoard();
      renderBoard();
      setTimeout(() => {
        const newMatches = findMatches();
        processMatches(newMatches, combo+1);
      }, 350);
    }, 300);
  }, 350);
}

function dropGems() {
  for (let c = 0; c < COLS; c++) {
    let empty = ROWS - 1;
    for (let r = ROWS-1; r >= 0; r--) {
      if (board[r][c].type==='obstacle') { empty = r-1; continue; }
      if (board[r][c].gem !== null) {
        if (r !== empty) {
          board[empty][c].gem = board[r][c].gem;
          board[empty][c].frozen = board[r][c].frozen;
          board[r][c].gem = null;
          board[r][c].frozen = false;
        }
        empty--;
      }
    }
  }
}

function fillBoard() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (board[r][c].type !== 'obstacle' && board[r][c].gem === null) {
        board[r][c].gem = randomGem();
      }
    }
  }
}

// ── 提示 ──────────────────────────────────────────────
function findHint() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (board[r][c].type==='obstacle'||board[r][c].frozen) continue;
      const dirs = [[0,1],[1,0]];
      for (const [dr,dc] of dirs) {
        const nr=r+dr, nc=c+dc;
        if (nr>=ROWS||nc>=COLS) continue;
        if (board[nr][nc].type==='obstacle'||board[nr][nc].frozen) continue;
        swapGems(r,c,nr,nc);
        const m = findMatches();
        swapGems(r,c,nr,nc);
        if (m.length > 0) return [{r,c},{r:nr,c:nc}];
      }
    }
  }
  return null;
}

function showHint() {
  clearHint();
  const hint = findHint();
  if (!hint) { showToast('🔀 没有可用步骤，请重排！'); return; }

  const [{r:r1,c:c1},{r:r2,c:c2}] = hint;

  // 模拟交换，找出消除的格子
  swapGems(r1,c1,r2,c2);
  const matches = findMatches();
  swapGems(r1,c1,r2,c2);

  // 高亮：交换的两个格子（箭头感）+ 会被消除的格子
  const swapCells = [{r:r1,c:c1},{r:r2,c:c2}];
  hintCells = [...swapCells, ...matches];

  // 交换格子用特殊样式
  swapCells.forEach(({r,c}) => {
    const el = getCellEl(r,c);
    if (el) { el.classList.add('hint'); el.classList.add('hint-swap'); }
  });
  // 消除格子用另一种样式
  matches.forEach(({r,c}) => {
    const el = getCellEl(r,c);
    if (el) el.classList.add('hint-match');
  });

  showToast('💡 交换闪烁的两个，消除高亮的！');
  hintTimer = setTimeout(clearHint, 4000);
}

function clearHint() {
  if (hintTimer) { clearTimeout(hintTimer); hintTimer=null; }
  hintCells.forEach(({r,c}) => {
    const el = getCellEl(r,c);
    if (el) { el.classList.remove('hint','hint-swap','hint-match'); }
  });
  hintCells = [];
}

function shuffleBoard() {
  if (animating) return;
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
    if (board[r][c].type!=='obstacle') {
      const nr=Math.floor(Math.random()*ROWS), nc=Math.floor(Math.random()*COLS);
      if (board[nr][nc].type!=='obstacle') swapGems(r,c,nr,nc);
    }
  }
  renderBoard();
  showToast('🔀 已重新排列！');
}

// ── 游戏结束检测 ──────────────────────────────────────
function checkGameEnd() {
  const allDone = goals.every(g => g.current >= g.target);
  if (allDone || score >= levelConfig.targetScore) {
    setTimeout(() => showOverlay(true), 300);
    return;
  }
  if (moves <= 0) {
    setTimeout(() => showOverlay(false), 300);
    return;
  }
  if (!findHint()) shuffleBoard();
}

function showOverlay(win) {
  const overlay = document.getElementById('overlay');
  document.getElementById('overlayTitle').textContent = win ? '🎉 过关！' : '💔 失败';
  document.getElementById('overlaySub').textContent = win
    ? `第 ${currentLevel} 关完成！准备好迎接第 ${currentLevel+1} 关了吗？`
    : '步数用完了，再试一次吧！';
  document.getElementById('overlayScore').textContent = `得分：${score.toLocaleString()}`;
  const btn = document.querySelector('.overlay-btn');
  if (win) {
    btn.textContent = '下一关 ▶';
    btn.onclick = nextLevel;
  } else {
    btn.textContent = '再试一次';
    btn.onclick = restartGame;
  }
  overlay.classList.add('show');
}

function nextLevel() {
  document.getElementById('overlay').classList.remove('show');
  currentLevel++;
  levelConfig = genLevelConfig(currentLevel);
  score = 0;
  moves = levelConfig.moves;
  goals = levelConfig.goals.map(g => ({...g, current:0}));
  animating = false; selected = null;
  clearHint();
  initBoard();
  renderBoard();
  renderHUD();
  showToast(`🌟 第 ${currentLevel} 关开始！`);
}

// ── 工具函数 ──────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

function showCombo(n) {
  const el = document.createElement('div');
  el.className = 'combo-text';
  el.textContent = `${n}连消！🔥`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

function restartGame() {
  document.getElementById('overlay').classList.remove('show');
  levelConfig = genLevelConfig(currentLevel);
  score = 0; moves = levelConfig.moves;
  goals = levelConfig.goals.map(g => ({...g, current:0}));
  animating = false; selected = null;
  clearHint();
  initBoard();
  renderBoard();
  renderHUD();
}

// ── 启动 ──────────────────────────────────────────────
initStars();
initBoard();
renderBoard();
renderHUD();
showToast('🌟 第 1 关开始！');
</script>
