      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="50%" stop-color="#2d0a5e"/>
      <stop offset="100%" stop-color="#1a0533"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
